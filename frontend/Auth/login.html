<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Школьный портал</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
        }
        
        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
        }
        
        .logo-glow {
            position: absolute;
            inset: -10px;
            background: linear-gradient(to bottom right, #cbd5e1, #94a3b8);
            border-radius: 50%;
            filter: blur(20px);
            opacity: 0.3;
        }
        
    </style>
</head>
<body class="flex items-center justify-center p-4 sm:p-6">
    
    <div class="card p-8 sm:p-10 md:pt-12 md:pb-10 md:px-10 w-full max-w-md">
        
        <!-- Логотип и заголовок -->
        <div class="flex flex-col items-center text-center space-y-6 sm:space-y-8 mb-6">
            <div class="relative group">
                <div class="logo-glow"></div>
                <div class="relative flex shrink-0 overflow-hidden rounded-full h-20 w-20 sm:h-24 sm:w-24 shadow-lg ring-4 ring-white/50">
                    <img class="aspect-square h-full w-full object-cover" 
                         alt="Школьный Вестник logo" 
                         src="https://qtrypzzcjebvfcihiynt.supabase.co/storage/v1/object/public/base44-prod/public/6970e514a90c22559619a4de/d7639513f_logo.png">
                </div>
            </div>
            
            <div class="space-y-2 sm:space-y-3">
                <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 tracking-tight">
                    Добро пожаловать в Школьный вестник
                </h1>
                <p class="text-gray-600 text-sm sm:text-base font-medium">
                    Войдите, чтобы продолжить
                </p>
            </div>
        </div>

        <!-- Кнопка Google -->
        <div class="w-full">
            <div class="space-y-3">
                <button class="w-full flex items-center justify-center gap-3 bg-white text-gray-700 px-5 py-3.5 rounded-xl border border-gray-200 hover:bg-gray-50 hover:border-gray-300 hover:shadow-sm transition-all duration-200 font-medium text-[16px]">
                    <div>
                        <svg class="h-5 w-5" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
                        </svg>
                    </div>
                    <span>Продолжить с Google</span>
                </button>
            </div>

            <!-- Разделитель -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="shrink-0 h-[1px] w-full bg-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-xs uppercase">
                    <span class="bg-white px-3 text-gray-400 font-medium tracking-wider">
                        или
                    </span>
                </div>
            </div>

            <!-- Форма входа -->
            <form class="space-y-4 sm:space-y-5">
                <div class="space-y-3 sm:space-y-4">
                    <!-- Email поле -->
                    <div class="space-y-1.5">
                        <label class="peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-sm font-medium text-center block text-gray-700" for="email">
                            Электронная почта
                        </label>
                        <div class="relative">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail absolute left-3 top-1/2 transform -translate-y-1/2 h-4 w-4 text-gray-400">
                                <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                            </svg>
                            <input type="email" 
                                   class="flex w-full border px-3 py-2 text-base ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 md:text-sm pl-10 h-11 sm:h-12 bg-gray-50/50 border-gray-200 focus:border-gray-400 focus:ring-gray-400 rounded-xl placeholder:text-gray-400" 
                                   id="email" 
                                   placeholder="you@example.com" 
                                   required>
                        </div>
                    </div>

                    <!-- Пароль поле -->
                    <div class="space-y-1.5">
                        <label class="peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-sm font-medium text-gray-700 text-center block" for="password">
                            Пароль
                        </label>
                        <div class="relative">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock absolute left-3 top-1/2 transform -translate-y-1/2 h-4 w-4 text-gray-400">
                                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <input type="password" 
                                   class="flex w-full border px-3 py-2 text-base ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 md:text-sm pl-10 h-11 sm:h-12 bg-gray-50/50 border-gray-200 focus:border-gray-400 focus:ring-gray-400 rounded-xl placeholder:text-gray-400" 
                                   id="password" 
                                   placeholder="••••••••" 
                                   required>
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <!-- Кнопка Вход -->
                    <button class="inline-flex items-center justify-center gap-1 whitespace-nowrap text-sm ring-offset-background focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 px-3 py-2 w-full h-11 sm:h-12 bg-gray-900 hover:bg-gray-800 text-white font-medium shadow-sm rounded-xl transition-all duration-200" 
                            type="submit">
                        Вход
                    </button>

                    <!-- Ссылки -->
                    <div class="flex flex-col sm:flex-row items-center justify-between gap-2 sm:gap-0 pt-2">
                        <button type="button" class="text-sm text-gray-500 hover:text-gray-700 font-bold transition-colors">
                             <a href="reset-password.html">Забыли пароль?</a>
                        </button>
                        <button type="button" class="text-sm text-gray-500 hover:text-gray-700 transition-colors" >
                            Нужна учётная запись? 
                            <a href="register.html" class="font-bold text-gray-700">Зарегистрироваться</a>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        // === ЭЛЕМЕНТЫ DOM ===
        const elements = {
            loginForm: document.querySelector('form'),
            email: document.getElementById('email'),
            password: document.getElementById('password'),
            googleBtn: document.querySelector('button[class*="bg-white"]'),
            forgotPasswordBtn: document.querySelector('button:contains("Забыли пароль")'),
            registerBtn: document.querySelector('button:contains("Нужна учётная запись")')
        };

        // === ИНИЦИАЛИЗАЦИЯ ===
        document.addEventListener('DOMContentLoaded', function() {
            // Форма входа
            if (elements.loginForm) {
                elements.loginForm.addEventListener('submit', handleLogin);
            }
            
            // Кнопка Google
            if (elements.googleBtn) {
                elements.googleBtn.addEventListener('click', handleGoogleLogin);
            }
            
            // Ссылки
            if (elements.forgotPasswordBtn) {
                elements.forgotPasswordBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    alert('Функция восстановления пароля временно недоступна');
                });
            }
            
            if (elements.registerBtn) {
                elements.registerBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    alert('Функция регистрации временно недоступна. Обратитесь к администратору.');
                });
            }
            
            // Автозаполнение для демо
            setTimeout(() => {
                if (elements.email) elements.email.value = 'teacher@school.ru';
                if (elements.password) elements.password.value = 'demo123';
            }, 300);
        });

        // === ФУНКЦИИ ===
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function handleLogin(e) {
            e.preventDefault();
            
            // Валидация
            const email = elements.email.value.trim();
            const password = elements.password.value.trim();
            
            let hasError = false;
            
            if (!email || !validateEmail(email)) {
                elements.email.style.borderColor = '#ef4444';
                hasError = true;
            } else {
                elements.email.style.borderColor = '';
            }
            
            if (!password) {
                elements.password.style.borderColor = '#ef4444';
                hasError = true;
            } else {
                elements.password.style.borderColor = '';
            }
            
            if (hasError) return;
            
            // Демо логика
            const demoCredentials = {
                'teacher@school.ru': 'demo123',
                'student@school.ru': 'demo123',
                'admin@school.ru': 'demo123'
            };
            
            if (demoCredentials[email] && demoCredentials[email] === password) {
                alert('Вход выполнен успешно!');
            } else {
                alert('Неверный email или пароль');
                elements.password.value = '';
                elements.password.focus();
            }
        }

        function handleGoogleLogin() {
            alert('Вход через Google временно недоступен');
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
